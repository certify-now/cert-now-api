name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Runs on every push/PR: spotless + compile (no tests)
  # ─────────────────────────────────────────────────────────────
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Spotless check & compile
        run: ./gradlew --no-daemon spotlessCheck build -x test

  # ─────────────────────────────────────────────────────────────
  # Runs only on version tags: full test suite against postgres
  # ─────────────────────────────────────────────────────────────
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: lint-build
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: certify-now
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test -d certify-now"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run all tests
        run: ./gradlew --no-daemon test
        env:
          SPRING_PROFILES_ACTIVE: test

  # ─────────────────────────────────────────────────────────────
  # Staging: push to main → skip tests, deploy fast
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: lint-build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: ./gradlew build -x test

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/certify-now/cert-now-api:staging

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: maher
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.staging.yml
          target: "~/"

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: maher
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -p cert-now-staging --env-file ~/staging.env -f ~/docker-compose.staging.yml pull app
            docker compose -p cert-now-staging --env-file ~/staging.env -f ~/docker-compose.staging.yml up -d
            sleep 15
            docker compose -p cert-now-staging --env-file ~/staging.env -f ~/docker-compose.staging.yml ps | grep "app" | grep "Up"
            echo "Staging deployed successfully"

  # ─────────────────────────────────────────────────────────────
  # Production: tag v* → tests must pass first, then deploy
  # ─────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-build, test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: ./gradlew build -x test

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/certify-now/cert-now-api:latest
            ghcr.io/certify-now/cert-now-api:${{ github.ref_name }}

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: maher
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: "~/"

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: maher
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -p cert-now-prod --env-file ~/prod.env -f ~/docker-compose.prod.yml pull app
            docker compose -p cert-now-prod --env-file ~/prod.env -f ~/docker-compose.prod.yml up -d
            sleep 15
            docker compose -p cert-now-prod --env-file ~/prod.env -f ~/docker-compose.prod.yml ps | grep "app" | grep "Up"
            echo "Production deployed successfully"
