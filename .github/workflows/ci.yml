name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, Test, and Spotless
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Spotless and full build (includes tests)
        run: ./gradlew --no-daemon spotlessCheck build

  deploy-dev:
    name: Deploy to Dev
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/maherk96/certify-now-api:latest

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          port: ${{ secrets.DEV_SERVER_PORT }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            export PATH=$PATH:/opt/homebrew/bin:/usr/local/bin
            export DOCKER_HOST=unix:///Users/maherkarim/Library/Containers/com.docker.docker/Data/docker-cli.sock
            export DOCKER_CONFIG=~/certify-now/.docker
            cd ~/certify-now
            set -a && source .env.dev && set +a
            echo "${{ secrets.GITHUB_TOKEN }}" | /opt/homebrew/bin/docker login ghcr.io -u ${{ github.actor }} --password-stdin
            DOCKER_CONFIG=~/certify-now/.docker /opt/homebrew/bin/docker-compose -f docker-compose.base.yml -f docker-compose.dev.yml pull
            DOCKER_CONFIG=~/certify-now/.docker /opt/homebrew/bin/docker-compose -f docker-compose.base.yml -f docker-compose.dev.yml up -d
