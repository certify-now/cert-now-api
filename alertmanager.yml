global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.ionos.co.uk:587'
  smtp_from: '${MAIL_USERNAME}'
  smtp_auth_username: '${MAIL_USERNAME}'
  smtp_auth_password: '${MAIL_PASSWORD}'
  smtp_require_tls: true

route:
  receiver: 'staging-alerts'
  group_by: ['alertname', 'environment']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Prod alerts — all severities
    - matchers:
        - environment = "prod"
      receiver: 'prod-alerts'
      routes:
        - matchers:
            - severity = "critical"
          receiver: 'prod-alerts'
          repeat_interval: 1h

    # Staging alerts — all severities
    - matchers:
        - environment = "staging"
      receiver: 'staging-alerts'
      routes:
        - matchers:
            - severity = "critical"
          receiver: 'staging-alerts'
          repeat_interval: 1h

receivers:
  - name: 'staging-alerts'
    email_configs:
      - to: '${MAIL_USERNAME}'
        send_resolved: true
        headers:
          subject: '[cert-now-api][{{ .Status | toUpper }}][STAGING] {{ .GroupLabels.alertname }}'
        html: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}<br>
          Details: {{ .Annotations.description }}<br>
          Severity: {{ .Labels.severity }}<br>
          Environment: staging<br>
          Started: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL_STAGING}'
        channel: '#staging-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} [cert-now-api][STAGING] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Severity: `{{ .Labels.severity }}`
          {{ end }}

  - name: 'prod-alerts'
    email_configs:
      - to: '${MAIL_USERNAME}'
        send_resolved: true
        headers:
          subject: '[cert-now-api][{{ .Status | toUpper }}][PROD] {{ .GroupLabels.alertname }}'
        html: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}<br>
          Details: {{ .Annotations.description }}<br>
          Severity: {{ .Labels.severity }}<br>
          Environment: prod<br>
          Started: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL_PROD}'
        channel: '#production-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} [cert-now-api][PROD] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Severity: `{{ .Labels.severity }}`
          {{ end }}

inhibit_rules:
  - source_matchers:
      - alertname = "AppDown"
    target_matchers:
      - alertname =~ "HighHeapUsage|MetaspaceNearLimit|HighErrorRate|SlowResponseTime|HighGCOverhead"
    equal: ['environment']
