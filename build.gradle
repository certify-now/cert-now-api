plugins {
    id 'org.springframework.boot' version '4.0.2'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'java'
    id 'com.diffplug.spotless' version '6.25.0'
}

group = 'com.uk.certifynow'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

bootRun {
    environment SPRING_PROFILES_ACTIVE: environment.SPRING_PROFILES_ACTIVE ?: 'dev'
}

repositories {
    mavenCentral()
}


dependencies {
    // PDF generation (OpenHTMLtoPDF LGPL 2.1, PDFBox Apache 2.0 — safe for commercial SaaS)
    implementation('com.openhtmltopdf:openhtmltopdf-pdfbox:1.0.10')
    // QR code generation (ZXing, Apache 2.0)
    implementation('com.google.zxing:core:3.5.3')
    implementation('com.google.zxing:javase:3.5.3')
    // Standalone Thymeleaf for PDF template rendering (Apache 2.0)
    implementation('org.thymeleaf:thymeleaf:3.1.3.RELEASE')
    implementation('org.springframework.boot:spring-boot-starter-web')
    implementation('org.springframework.boot:spring-boot-starter-actuator')
    runtimeOnly('io.micrometer:micrometer-registry-prometheus')
    implementation('org.springframework.boot:spring-boot-starter-mail')
    implementation('org.springframework.boot:spring-boot-starter-validation')
    implementation('org.springframework.boot:spring-boot-starter-data-jpa')
    implementation('org.springframework.boot:spring-boot-starter-security')
    implementation('io.jsonwebtoken:jjwt-api:0.12.6')
    runtimeOnly('io.jsonwebtoken:jjwt-impl:0.12.6')
    runtimeOnly('io.jsonwebtoken:jjwt-jackson:0.12.6')
    runtimeOnly('org.postgresql:postgresql')
    implementation('io.github.wimdeblauwe:error-handling-spring-boot-starter:5.0.1')
    implementation('org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.1')
    implementation('commons-codec:commons-codec:1.16.0')  // For SHA-256 hashing
    // MinIO Java SDK — S3-compatible object storage (Apache 2.0)
    implementation('io.minio:minio:8.6.0')
    // PostGIS / Hibernate Spatial — geospatial queries for engineer radius matching
    implementation('org.hibernate.orm:hibernate-spatial')
    implementation('org.locationtech.jts:jts-core:1.19.0')
    // MapStruct for compile-time DTO mapping (Apache 2.0)
    implementation('org.mapstruct:mapstruct:1.6.3')
    annotationProcessor('org.mapstruct:mapstruct-processor:1.6.3')
    testAnnotationProcessor('org.mapstruct:mapstruct-processor:1.6.3')
    compileOnly('org.projectlombok:lombok')
    annotationProcessor('org.projectlombok:lombok')
    // Lombok-MapStruct binding — lets MapStruct see Lombok-generated getters/setters
    annotationProcessor('org.projectlombok:lombok-mapstruct-binding:0.2.0')
    testCompileOnly('org.projectlombok:lombok')
    testAnnotationProcessor('org.projectlombok:lombok')
    implementation('org.flywaydb:flyway-core')
    implementation('org.flywaydb:flyway-database-postgresql')
    developmentOnly('org.springframework.boot:spring-boot-docker-compose')
    testRuntimeOnly('com.h2database:h2')  // H2 for unit tests
    testImplementation('org.springframework.boot:spring-boot-starter-test')
    testImplementation('io.rest-assured:rest-assured:6.0.0')
    testImplementation('io.rest-assured:json-path:6.0.0')
    testImplementation('io.cucumber:cucumber-java:7.15.0')
    testImplementation('io.cucumber:cucumber-spring:7.15.0')
    testImplementation('io.cucumber:cucumber-junit-platform-engine:7.15.0')
    testImplementation('org.junit.platform:junit-platform-suite')
    testImplementation('org.springframework.boot:spring-boot-testcontainers')
    testImplementation('org.testcontainers:junit-jupiter:1.21.4')
    testImplementation('org.testcontainers:postgresql:1.21.4')
    testImplementation('org.wiremock.integrations:wiremock-spring-boot:3.1.0')
    testImplementation('org.awaitility:awaitility')
    testImplementation('org.assertj:assertj-core')
    testImplementation('io.jsonwebtoken:jjwt-api:0.12.6')
    testRuntimeOnly('io.jsonwebtoken:jjwt-impl:0.12.6')
    testRuntimeOnly('io.jsonwebtoken:jjwt-jackson:0.12.6')
}

// Configure MapStruct to use Spring component model
compileJava {
    options.compilerArgs += [
        '-Amapstruct.defaultComponentModel=spring',
        '-Amapstruct.unmappedTargetPolicy=IGNORE'
    ]
}

tasks.withType(Test) {
    useJUnitPlatform()
    jvmArgs(
        '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
        '--add-opens', 'java.base/java.util=ALL-UNNAMED',
        '--add-opens', 'java.base/java.io=ALL-UNNAMED',
        '--add-opens', 'java.base/java.net=ALL-UNNAMED',
        '--add-opens', 'java.base/sun.net.www.protocol.http=ALL-UNNAMED',
        '--add-opens', 'java.base/sun.net.www.protocol.https=ALL-UNNAMED'
    )
}

spotless {
    java {
        target 'src/**/*.java'
        googleJavaFormat()
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
        toggleOffOn()
        importOrder()
    }
}
