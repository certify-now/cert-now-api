# Development deployment compose overrides.
# Do not commit .env.dev; keep it local or in your secret manager.
services:
  app:
    extends:
      file: docker-compose.base.yml
      service: app
    env_file:
      - .env.dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "${APP_PORT:-8080}:8080"

  postgres:
    extends:
      file: docker-compose.base.yml
      service: postgres
    env_file:
      - .env.dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    extends:
      file: docker-compose.base.yml
      service: redis
    env_file:
      - .env.dev
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  postgres_data:
  redis_data:
