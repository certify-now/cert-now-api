services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  alertmanager-config:
    image: alpine:latest
    volumes:
      - ./alertmanager.yml:/tmp/alertmanager.yml.tmpl:ro
      - alertmanager_config:/etc/alertmanager
    environment:
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SLACK_WEBHOOK_URL_STAGING: ${SLACK_WEBHOOK_URL_STAGING}
      SLACK_WEBHOOK_URL_PROD: ${SLACK_WEBHOOK_URL_PROD}
    command: >
      sh -c "apk add --no-cache gettext --quiet
      && envsubst < /tmp/alertmanager.yml.tmpl > /etc/alertmanager/alertmanager.yml"

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - alertmanager_config:/etc/alertmanager
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    depends_on:
      alertmanager-config:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 64m
    mem_reservation: 32m

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://monitoring.certnow.co.uk
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m

volumes:
  prometheus_data:
  alertmanager_config:
  alertmanager_data:
  grafana_data:
