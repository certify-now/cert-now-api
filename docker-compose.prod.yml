services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cert-now-prod
      POSTGRES_USER: ${JDBC_DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${JDBC_DATABASE_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JDBC_DATABASE_USERNAME} -d cert-now-prod"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    mem_reservation: 256m
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9003"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9002:9000"
      - "9003:9003"
    volumes:
      - minio_prod:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 512m
    mem_reservation: 256m
    restart: unless-stopped

  app:
    image: ghcr.io/certify-now/cert-now-api:latest
    ports:
      - "8447:8080"
    volumes:
      - prod_logs:/app/logs
    environment:
      JAVA_OPTS: "-Xms256m -Xmx768m -XX:MaxMetaspaceSize=256m"
      SPRING_PROFILES_ACTIVE: prod
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/cert-now-prod
      JDBC_DATABASE_USERNAME: ${JDBC_DATABASE_USERNAME}
      JDBC_DATABASE_PASSWORD: ${JDBC_DATABASE_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM}
      APP_EMAIL_REPLY_TO: ${APP_EMAIL_REPLY_TO}
      APP_EMAIL_SUPPORT: ${APP_EMAIL_SUPPORT}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-cert-now-docs}
    mem_limit: 1200m
    mem_reservation: 768m
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_prod:
  minio_prod:
  prod_logs:
