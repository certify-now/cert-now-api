services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cert-now-prod
      POSTGRES_USER: ${JDBC_DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${JDBC_DATABASE_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JDBC_DATABASE_USERNAME} -d cert-now-prod"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    mem_reservation: 256m

  app:
    image: ghcr.io/certify-now/cert-now-api:latest
    ports:
      - "8447:8080"
    volumes:
      - prod_logs:/app/logs
    environment:
      JAVA_OPTS: "-Xms256m -Xmx768m -XX:MaxMetaspaceSize=128m"
    mem_limit: 1200m
    mem_reservation: 768m
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/cert-now-prod
      JDBC_DATABASE_USERNAME: ${JDBC_DATABASE_USERNAME}
      JDBC_DATABASE_PASSWORD: ${JDBC_DATABASE_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM}
      APP_EMAIL_REPLY_TO: ${APP_EMAIL_REPLY_TO}
      APP_EMAIL_SUPPORT: ${APP_EMAIL_SUPPORT}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_prod:
  prod_logs:
