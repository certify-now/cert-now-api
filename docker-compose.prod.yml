# Production deployment compose overrides.
# Do not commit .env.prod; keep it in a secure secret store.
services:
  app:
    extends:
      file: docker-compose.base.yml
      service: app
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${APP_PORT:-8080}:8080"

  postgres:
    extends:
      file: docker-compose.base.yml
      service: postgres
    env_file:
      - .env.prod
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    extends:
      file: docker-compose.base.yml
      service: redis
    env_file:
      - .env.prod

volumes:
  postgres_data:
  redis_data:
