global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'cert-now-staging'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8443']
    labels:
      environment: 'staging'

  - job_name: 'cert-now-prod'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8447']
    labels:
      environment: 'prod'
