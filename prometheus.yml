global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'cert-now-staging'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8443']
        labels:
          environment: 'staging'

  - job_name: 'cert-now-prod'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8447']
        labels:
          environment: 'prod'
