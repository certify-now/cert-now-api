logging:
  file:
    name: ./logs/app.log
  logback:
    rollingpolicy:
      file-name-pattern: ./logs/app.%d{yyyy-MM-dd}.%i.log.gz

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.dev[.properties]
  flyway:
    enabled: false
    locations: classpath:db/migration,classpath:db/dev-seed
  docker:
    compose:
      lifecycle-management: start-only
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5433/cert-now-api}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:P4ssword!}
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
  mail:
    username: ${MAIL_USERNAME:hello@certnow.co.uk}
    password: ${MAIL_PASSWORD:}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  storage:
    provider: minio
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:cert-now-docs}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*}
  email:
    provider: ${APP_EMAIL_PROVIDER:smtp}
    from: ${APP_EMAIL_FROM:hello@certnow.co.uk}
    reply-to: ${APP_EMAIL_REPLY_TO:admin@certnow.co.uk}
    support: ${APP_EMAIL_SUPPORT:admin@certnow.co.uk}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-64-bytes-long-for-hs512-algorithm-padding}
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}
  ideal-postcodes:
    api-key: ${IDEAL_POSTCODES_API_KEY:}
    base-url: https://api.ideal-postcodes.co.uk/v1
  epc:
    api-key: ${EPC_API_KEY:}
