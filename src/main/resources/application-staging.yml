spring:
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  storage:
    provider: minio
  minio:
    endpoint: ${MINIO_ENDPOINT}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket-name: ${MINIO_BUCKET_NAME:cert-now-docs}
  base-url: ${APP_BASE_URL}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS}
  email:
    provider: ${APP_EMAIL_PROVIDER:smtp}
    from: ${APP_EMAIL_FROM}
    reply-to: ${APP_EMAIL_REPLY_TO}
    support: ${APP_EMAIL_SUPPORT}
  jwt:
    secret: ${JWT_SECRET}
  admin:
    email: admin@certnow.co.uk
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}
