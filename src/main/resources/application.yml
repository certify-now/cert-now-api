spring:
  datasource:
    hikari:
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
  jpa:
    open-in-view: false

error:
  handling:
    http-status-in-json-response: true
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none

app:
  base-url: ${APP_BASE_URL}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-days: 30
  security:
    max-refresh-tokens-per-user: 5
  email-verification:
    token-expiry-hours: 24
  frontend:
    base-url: ${FRONTEND_BASE_URL}
