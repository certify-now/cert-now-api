logging:
  level:
    org.hibernate.orm.jdbc.warn: ERROR
  file:
    name: /app/logs/app.log
  logback:
    rollingpolicy:
      file-name-pattern: /app/logs/app.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 50MB
      max-history: 30
      clean-history-on-start: false

spring:
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
  mail:
    host: smtp.ionos.co.uk
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: cert-now-api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none

error:
  handling:
    http-status-in-json-response: true
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    exception-logging: NO_LOGGING

certifynow:
  matching:
    broadcast-expiry-minutes: 15
    unmatched-job-check-interval-ms: 30000
    expired-broadcast-check-interval-ms: 30000

app:
  pricing:
    commission-rate: 0.15
  jwt:
    access-token-expiry-ms: 900000
    refresh-token-expiry-days: 30
  security:
    max-refresh-tokens-per-user: 5
  email-verification:
    token-expiry-hours: 24
