logging:
  level:
    org.hibernate.orm.jdbc.warn: ERROR
  file:
    name: /app/logs/app.log
  logback:
    rollingpolicy:
      file-name-pattern: /app/logs/app.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 50MB
      max-history: 30
      clean-history-on-start: false

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 60MB
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
  mail:
    host: ${MAIL_HOST:smtp.ionos.co.uk}
    port: ${MAIL_PORT:587}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: cert-now-api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none

error:
  handling:
    http-status-in-json-response: true
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    exception-logging: NO_LOGGING

certifynow:
  matching:
    broadcast-expiry-minutes: 15
    unmatched-job-check-interval-ms: 30000
    expired-broadcast-check-interval-ms: 30000
    escalation-reminder-interval-minutes: 15     # re-alert every N minutes while job is ESCALATED
    escalation-reminder-check-interval-ms: 60000  # how often the scheduler polls for due reminders

share:
  base-url: ${SHARE_BASE_URL:http://localhost:8080}
  default-expiry-days: 30
  max-expiry-days: 90

app:
  certificate-types:
    uploadable:
      - type: GAS_SAFETY
        name: Gas Safety
        description: Annual gas safety inspection
        expiry-required: true
      - type: EICR
        name: EICR
        description: Electrical safety inspection
        expiry-required: true
      - type: PAT
        name: PAT Testing
        description: Portable appliance testing
        expiry-required: false
      - type: FIRE_RISK_ASSESSMENT
        name: Fire Risk Assessment
        description: Required for HMOs and larger properties
        expiry-required: false
      - type: BOILER_SERVICE
        name: Boiler Service
        description: Annual service record
        expiry-required: false
      - type: LEGIONELLA_RISK_ASSESSMENT
        name: Legionella Assessment
        description: Water safety risk check
        expiry-required: false
      - type: CUSTOM
        name: Other (Custom)
        description: Add your own certificate type
        expiry-required: false
  pricing:
    commission-rate: 0.15
  jwt:
    access-token-expiry-ms: 900000
    refresh-token-expiry-days: 30
  security:
    max-refresh-tokens-per-user: 5
  email-verification:
    token-expiry-hours: 24
  admin:
    email: ${ADMIN_EMAIL:admin@certnow.co.uk}
  slack:
    webhook-url: ""  # override in profile-specific yml or via SLACK_WEBHOOK_URL env var
  ideal-postcodes:
    api-key: ${IDEAL_POSTCODES_API_KEY:}
    base-url: https://api.ideal-postcodes.co.uk/v1
  epc:
    base-url: https://api.get-energy-performance-data.communities.gov.uk
    api-key: ${EPC_API_KEY:}
