<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Expired — CertNow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f4f6f8;
      color: #1a2433;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #0d9488;
      letter-spacing: -0.5px;
    }
    .logo span { color: #1a2433; }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      width: 100%;
      max-width: 480px;
      padding: 40px 32px;
      text-align: center;
    }

    .error-icon { font-size: 48px; margin-bottom: 20px; }

    .error-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a2433;
      margin-bottom: 12px;
    }

    .error-body {
      font-size: 15px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .error-hint {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0d9488;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 12px;
      min-height: 50px;
      transition: background 0.15s;
    }
    .cta-btn:hover { background: #0f766e; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Cert<span>Now</span></div>
  </div>

  <div class="card">
    <div class="error-icon">⚠️</div>
    <h1 class="error-title">This link has expired<br>or is no longer valid</h1>
    <p class="error-body">
      Certificate share links expire after 30 days for security purposes.
    </p>
    <p class="error-hint">
      Please contact your landlord or property manager to request a new share link.
    </p>
    <a href="https://certnow.co.uk" class="cta-btn">Visit CertNow.co.uk</a>
  </div>

</body>
</html>
