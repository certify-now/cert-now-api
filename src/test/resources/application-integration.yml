spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/certify-now
    username: postgres
    password: P4ssword!
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
    open-in-view: false
  docker:
    compose:
      enabled: false
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: test-integration-secret-key-that-is-at-least-512-bits-long-for-hs512-algorithm-test
    access-token-expiry-ms: 900000
    refresh-token-expiry-days: 30
  security:
    max-refresh-tokens-per-user: 5
  email-verification:
    token-expiry-hours: 24
  frontend:
    base-url: http://localhost:3000

error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
