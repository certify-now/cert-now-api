spring.application.name=certify-now
spring.profiles.active=test

# Test Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (test values)
app.jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits-required
app.jwt.access-token-expiry-minutes=15
app.jwt.refresh-token-expiry-days=7

# Email Verification Configuration
app.email-verification.token-expiry-hours=24
app.frontend.base-url=https://app.certifynow.co.uk

# Logging
logging.level.com.uk.certifynow=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
