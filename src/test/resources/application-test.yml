    refresh-token-expiry-days: 30
  security:
    max-refresh-tokens-per-user: 5
  email-verification:
    token-expiry-hours: 24
  frontend:
    base-url: http://localhost:8080

wiremock:
  server:
    port: 8089

APP_BASE_URL: http://localhost:8080
FRONTEND_BASE_URL: http://localhost:8080
