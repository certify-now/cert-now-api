spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/certify-now
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  base-url: http://localhost:8080
  email:
    provider: stub
    from: no-reply@certifynow.test
  jwt:
    secret: test-secret-key-that-is-at-least-64-bytes-long-for-hs512-algorithm-padding
